site_name: "The Ten Commandments Deep Dive"
site_url: https://redmod79.github.io/cmd-website/
site_description: A comprehensive 17-study biblical investigation examining what the Bible says about each of the Ten Commandments -- origin, meaning, word studies, OT application, prophetic expansion, NT treatment, and cross-references across Scripture from Genesis to Revelation.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/solid/book-bible
      link: /

extra_javascript:
  - javascripts/verse-popup.js
  - javascripts/study-breadcrumbs.js
  - javascripts/external-links.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Methodology: methodology.md
  - "Research Tools & Process": tools.md
  - "Master Evidence File": master-evidence.md

